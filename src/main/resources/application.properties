spring.datasource.url=jdbc:sqlite:./Freelancers.db
spring.datasource.driver-class-name=org.sqlite.JDBC

server.port=8080

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.web.locale=pt

spring.thymeleaf.cache=false

# Senhas do seed de demonstração (apenas ambiente local; sobrescreva via variáveis de ambiente)
app.seed.enabled=true
app.demo.admin.password=${DEMO_ADMIN_PASSWORD:admin123}
app.demo.empresa.password=${DEMO_EMPRESA_PASSWORD:senha123}
app.demo.dev.password=${DEMO_DEV_PASSWORD:dev123}

spring.mail.host=${MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:noreply@freelancers.local}
app.mail.enabled=${MAIL_ENABLED:false}
