spring.datasource.url=jdbc:sqlite:/var/www/freelancers/data/Freelancers.db
spring.datasource.driver-class-name=org.sqlite.JDBC

spring.main.web-application-type=servlet

# Schema gerenciado por migrações Lua (validate falha com INTEGER vs BIGINT no SQLite)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

server.port=8080

# Seed: roda se o banco estiver vazio (requer DEMO_*_PASSWORD no servidor)
app.seed.enabled=${SEED_ENABLED:true}
app.demo.admin.password=${DEMO_ADMIN_PASSWORD:}
app.demo.empresa.password=${DEMO_EMPRESA_PASSWORD:}
app.demo.dev.password=${DEMO_DEV_PASSWORD:}

app.upload.dir=/var/www/freelancers/uploads

spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
