<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(#{projetos.detalhe})}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container page-content">
    <div th:replace="~{fragments/layout :: alerts}"></div>
    <h1 th:text="${projeto.titulo}">Projeto</h1>
    <p><strong th:text="#{projetos.empresa}">Empresa</strong>: <span th:text="${projeto.empresa.nome}"></span></p>
    <p><strong th:text="#{label.stack}">Stack</strong>: <span th:text="${projeto.stackTecnologica}"></span></p>
    <p><strong th:text="#{label.orcamento}">Orçamento</strong>: <span th:text="${projeto.orcamentoEstimado}"></span></p>
    <p><strong th:text="#{label.prazo}">Prazo</strong>: <span th:text="${projeto.prazoEntrega}"></span></p>
    <p th:text="${projeto.descricao}"></p>
    <div th:if="${!#lists.isEmpty(projeto.anexos)}" class="mb-3">
        <h5 th:text="#{label.anexos}">Anexos</h5>
        <div class="d-flex flex-wrap gap-2">
            <img th:each="a : ${projeto.anexos}" th:src="${a.caminho}" th:alt="${a.nomeArquivo}" class="img-thumbnail" style="max-height:120px"/>
        </div>
    </div>

    <div sec:authorize="hasRole('DESENVOLVEDOR')" class="mb-3">
        <a th:if="${jaProposto == null or !jaProposto}"
           th:href="@{/dev/propostas/novo/{id}(id=${projeto.id})}"
           class="btn btn-freelancers" th:text="#{btn.propor}">Enviar Proposta</a>
        <div th:if="${jaProposto}" class="alert alert-info">
            <span th:text="#{proposta.ja.enviada}">Você já enviou uma proposta para este projeto.</span>
            <a th:href="@{/dev/propostas}" th:text="#{propostas.title}">Minhas Propostas</a>
        </div>
    </div>

    <a th:href="@{/projetos}" class="btn btn-secondary" th:text="#{btn.voltar}">Voltar</a>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
