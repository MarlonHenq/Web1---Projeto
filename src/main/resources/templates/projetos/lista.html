<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{projetos.title})}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container page-content">
    <h1 th:text="#{projetos.title}">Projetos disponíveis</h1>
    <form th:action="@{/projetos}" method="get" class="row g-2 mb-4">
        <div class="col-auto">
            <input type="text" name="stack" class="form-control" th:value="${stack}" th:placeholder="#{label.filtroStack}"/>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-freelancers" th:text="#{btn.filtrar}">Filtrar</button>
        </div>
    </form>
    <div class="row">
        <div class="col-md-6 mb-3" th:each="p : ${projetos}">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title" th:text="${p.titulo}"></h5>
                    <p class="card-text" th:text="${p.stackTecnologica}"></p>
                    <p class="card-text"><small th:text="${p.empresa.nome}"></small></p>
                    <a th:href="@{/projetos/{id}(id=${p.id})}" class="btn btn-sm btn-freelancers" th:text="#{projetos.detalhe}">Detalhe</a>
                </div>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
