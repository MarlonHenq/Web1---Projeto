<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{nav.empresa.projetos})}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container page-content">
    <div th:replace="~{fragments/layout :: alerts}"></div>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 th:text="#{nav.empresa.projetos}">Meus Projetos</h1>
        <a th:href="@{/empresa/projetos/novo}" class="btn btn-freelancers" th:text="#{btn.novo}">Novo</a>
    </div>
    <table class="table table-striped">
        <thead>
        <tr>
            <th th:text="#{label.titulo}">Título</th>
            <th th:text="#{label.stack}">Stack</th>
            <th th:text="#{label.orcamento}">Orçamento</th>
            <th th:text="#{label.acoes}">Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${projetos}">
            <td th:text="${p.titulo}"></td>
            <td th:text="${p.stackTecnologica}"></td>
            <td th:text="${p.orcamentoEstimado}"></td>
            <td><a th:href="@{/empresa/projetos/{id}(id=${p.id})}" class="btn btn-sm btn-outline-primary" th:text="#{projetos.detalhe}">Detalhe</a></td>
        </tr>
        </tbody>
    </table>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
