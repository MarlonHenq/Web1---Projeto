<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{propostas.nova})}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container page-content">
    <div th:replace="~{fragments/layout :: alerts}"></div>
    <h1 th:text="#{propostas.nova}">Nova Proposta</h1>
    <p><strong th:text="#{label.titulo}">Projeto</strong>: <span th:text="${projeto.titulo}"></span></p>
    <p><strong th:text="#{projetos.empresa}">Empresa</strong>: <span th:text="${projeto.empresa.nome}"></span></p>

    <form th:action="@{/dev/propostas/salvar}" th:object="${proposta}" method="post" class="mt-4">
        <input type="hidden" name="projetoId" th:value="${projeto.id}"/>
        <div class="mb-3">
            <label class="form-label" th:text="#{label.valor}">Valor</label>
            <input type="number" step="0.01" class="form-control" th:field="*{valor}"/>
            <div class="text-danger" th:if="${#fields.hasErrors('valor')}" th:errors="*{valor}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label" th:text="#{label.prazoEstimado}">Prazo estimado</label>
            <input type="date" class="form-control" th:field="*{prazoEstimado}"/>
            <div class="text-danger" th:if="${#fields.hasErrors('prazoEstimado')}" th:errors="*{prazoEstimado}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label" th:text="#{label.justificativa}">Justificativa</label>
            <textarea class="form-control" th:field="*{justificativa}" rows="4"></textarea>
            <div class="text-danger" th:if="${#fields.hasErrors('justificativa')}" th:errors="*{justificativa}"></div>
        </div>
        <button type="submit" class="btn btn-freelancers" th:text="#{btn.enviar}">Enviar</button>
        <a th:href="@{/projetos/{id}(id=${projeto.id})}" class="btn btn-secondary" th:text="#{btn.voltar}">Voltar</a>
    </form>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
