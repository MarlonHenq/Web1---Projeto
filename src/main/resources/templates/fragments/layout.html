<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title} ?: #{app.title}">Freelancers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link th:href="@{/css/defaut.css}" rel="stylesheet"/>
    <link th:href="@{/css/app.css}" rel="stylesheet"/>
</head>

<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark navbar-freelancers">
    <div class="container">
        <a class="navbar-brand oxygennav" th:href="@{/}" th:text="#{app.title}">Freelancers</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMain">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link bar" th:href="@{/}" th:text="#{nav.home}">Início</a></li>
                <li class="nav-item"><a class="nav-link bar" th:href="@{/projetos}" th:text="#{nav.projetos}">Projetos</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link bar" th:href="@{/admin/desenvolvedores}" th:text="#{nav.admin.devs}">Desenvolvedores</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link bar" th:href="@{/admin/empresas}" th:text="#{nav.admin.empresas}">Empresas</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('EMPRESA')">
                    <a class="nav-link bar" th:href="@{/empresa/projetos}" th:text="#{nav.empresa.projetos}">Meus Projetos</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('DESENVOLVEDOR')">
                    <a class="nav-link bar" th:href="@{/dev/propostas}" th:text="#{nav.dev.propostas}">Minhas Propostas</a>
                </li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link bar" href="?lang=pt" th:text="#{nav.lang.pt}">PT</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link bar" href="?lang=en" th:text="#{nav.lang.en}">EN</a>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link bar" th:href="@{/cadastro}" th:text="#{nav.cadastro}">Criar conta</a>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link bar" th:href="@{/login}" th:text="#{nav.login}">Entrar</a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <span class="nav-link bar" sec:authentication="name">user</span>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-link nav-link bar" th:text="#{nav.logout}">Sair</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div th:fragment="alerts">
    <div th:if="${sucesso}" class="alert alert-success" th:text="${#messages.msgOrNull(sucesso) != null ? #messages.msg(sucesso) : sucesso}"></div>
    <div th:if="${erro}" class="alert alert-danger" th:text="${#messages.msgOrNull(erro) != null ? #messages.msg(erro) : erro}"></div>
</div>

<footer th:fragment="footer" class="footer mt-auto">
    <div class="container">
        <span th:text="#{app.title}">Freelancers</span> &copy; 2026
    </div>
</footer>

<script th:fragment="scripts" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
