name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  maven-build:
    name: Maven build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and test
        run: mvn -B verify
