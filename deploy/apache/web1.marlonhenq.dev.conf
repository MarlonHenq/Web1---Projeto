# Apache reverse proxy para Spring Boot em web1.marlonhenq.dev
# Copie: sudo cp deploy/apache/web1.marlonhenq.dev.conf /etc/apache2/sites-available/
# sudo a2ensite web1.marlonhenq.dev && sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName web1.marlonhenq.dev

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8080/
    ProxyPassReverse / http://127.0.0.1:8080/

    ErrorLog ${APACHE_LOG_DIR}/web1-error.log
    CustomLog ${APACHE_LOG_DIR}/web1-access.log combined
</VirtualHost>
